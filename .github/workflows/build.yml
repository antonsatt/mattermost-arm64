name: Build Mattermost ARM64

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC
  workflow_dispatch:
    inputs:
      mm_version:
        description: "Mattermost version to build (e.g. 11.5.0)"
        required: false

jobs:
  check-and-build:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Mattermost version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.mm_version }}" ]; then
            VERSION="${{ github.event.inputs.mm_version }}"
          else
            VERSION=$(curl -s https://api.github.com/repos/mattermost/mattermost/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Mattermost version: $VERSION"

      - name: Check if image already exists
        id: check
        run: |
          TAG="ghcr.io/${GITHUB_REPOSITORY,,}:${VERSION}"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Image $TAG already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Image $TAG not found, will build"
          fi
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Check ARM64 tarball exists
        if: steps.check.outputs.exists == 'false'
        run: |
          URL="https://releases.mattermost.com/${{ steps.version.outputs.version }}/mattermost-${{ steps.version.outputs.version }}-linux-arm64.tar.gz"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" -L "$URL")
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: ARM64 tarball not found at $URL (HTTP $STATUS)"
            exit 1
          fi
          echo "ARM64 tarball available at $URL"

      - name: Log in to GHCR
        if: steps.check.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"

          docker build \
            --build-arg MM_VERSION="$VERSION" \
            --tag "$IMAGE:$VERSION" \
            --tag "$IMAGE:latest" \
            .

          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

          echo "## Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** \`$IMAGE:$VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Platform:** linux/arm64" >> "$GITHUB_STEP_SUMMARY"

      - name: Bump tag in infra repo (deploy)
        if: steps.check.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          git clone --depth 1 \
            "https://x-access-token:${INFRA_REPO_TOKEN}@github.com/AntonSatt/sort-my-infra.git" infra
          cd infra
          FILE=kubernetes/apps/mattermost/deployment.yml
          OLD=$(grep -oE 'mattermost-arm64:[0-9]+\.[0-9]+\.[0-9]+' "$FILE" | head -1 | cut -d: -f2)
          # Safety: never auto-deploy a major bump (potentially breaking DB migrations) — do those by hand.
          if [ "${VERSION%%.*}" != "${OLD%%.*}" ]; then
            echo "Major version change ${OLD} -> ${VERSION}; skipping auto-bump (run manually)."
            exit 0
          fi
          sed -i -E "s#(ghcr.io/antonsatt/mattermost-arm64:).*#\1${VERSION}#" "$FILE"
          if git diff --quiet; then
            echo "Manifest already at ${VERSION}; nothing to commit."
            exit 0
          fi
          git config user.name  "mattermost-arm64-bot"
          git config user.email "bot@antonsatt.com"
          git commit -am "chore(mattermost): bump to ${VERSION}"
          git push
          echo "- **Deployed:** bumped infra manifest ${OLD} -> ${VERSION}" >> "$GITHUB_STEP_SUMMARY"
